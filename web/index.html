<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LanCache Dashboard</title>
  <script src="web_config.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { background: #1a1f2e; border-bottom: 1px solid #2d3748; padding: 16px 24px; display: flex; align-items: center; }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #63b3ed; }
    header span { font-size: 0.85rem; color: #718096; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 10px; padding: 20px; }
    .card-label { font-size: 0.75rem; color: #718096; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .card-value { font-size: 1.8rem; font-weight: 700; color: #63b3ed; }
    .card-sub { font-size: 0.8rem; color: #718096; margin-top: 4px; }
    .section { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 10px; padding: 24px; margin-bottom: 24px; }
    .section h2 { font-size: 1rem; font-weight: 600; color: #a0aec0; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    thead th { text-align: left; padding: 10px 12px; color: #718096; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #2d3748; }
    tbody tr.main-row { border-bottom: 1px solid #1e2533; transition: background 0.15s; }
    tbody tr.main-row:hover { background: #232b3e; }
    tbody td { padding: 12px; color: #e2e8f0; vertical-align: middle; }
    .rank { color: #718096; font-weight: 600; width: 36px; }
    .rank-1 { color: #f6c90e; }
    .rank-2 { color: #a8b2c0; }
    .rank-3 { color: #cd7f32; }
    .game-name { font-weight: 500; }
    .game-meta { font-size: 0.75rem; color: #718096; margin-top: 2px; }
    .bar-wrap { background: #2d3748; border-radius: 4px; height: 6px; min-width: 80px; margin-top: 4px; }
    .bar-fill { background: #48bb78; border-radius: 4px; height: 6px; transition: width 0.5s; }
    .hit-rate { font-weight: 600; }
    .hit-rate.good { color: #48bb78; }
    .hit-rate.ok   { color: #f6c90e; }
    .hit-rate.bad  { color: #fc8181; }
    .btn { background: #2d3748; border: 1px solid #4a5568; color: #e2e8f0; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; text-decoration: none; display: inline-block; transition: background 0.2s; }
    .btn:hover { background: #3d4a5e; }
    .empty { color: #718096; text-align: center; padding: 40px; font-size: 0.9rem; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #48bb78; display: inline-block; flex-shrink: 0; }
    .status-dot.offline { background: #fc8181; }
    .show-more { text-align: center; padding: 16px; }
    .chevron { font-size: 0.65rem; color: #718096; margin-left: 5px; display: inline-block; transition: transform 0.2s; cursor: pointer; }
    .chevron.open { transform: rotate(90deg); }
    .depot-row { display: none; }
    .depot-row.open { display: table-row; }
    .depot-row td { background: #141824; padding: 8px 12px 12px 52px; border-bottom: 1px solid #2d3748; }
    .depot-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .depot-tag { background: #1e2533; border: 1px solid #2d3748; border-radius: 4px; padding: 2px 8px; font-size: 0.72rem; color: #a0aec0; font-family: monospace; }
  </style>
</head>
<body>
<header>
  <div style="flex:1;">
    <h1>LanCache Dashboard</h1>
    <span id="last-update">Lade...</span>
  </div>
</header>

<div class="container">
  <div class="cards">
    <div class="card">
      <div class="card-label">Cache Hit Rate</div>
      <div class="card-value" id="hit-rate">-</div>
      <div class="card-sub">Gesamt</div>
    </div>
    <div class="card">
      <div class="card-label">Vom Cache geliefert</div>
      <div class="card-value" id="bytes-hit">-</div>
      <div class="card-sub">gespart</div>
    </div>
    <div class="card">
      <div class="card-label">Heruntergeladen</div>
      <div class="card-value" id="bytes-miss">-</div>
      <div class="card-sub">vom Internet</div>
    </div>
    <div class="card">
      <div class="card-label">Spiele im Cache</div>
      <div class="card-value" id="game-count">-</div>
      <div class="card-sub" id="depot-count-sub">Steam-Spiele gesamt</div>
    </div>
  </div>

  <div class="section">
    <h2>
      <span class="status-dot" id="status-dot"></span>
      Top Spiele vom Cache
      <span style="margin-left:auto; display:flex; gap:6px;">
        <a class="btn" href="#" onclick="loadDepots(); return false;">Aktualisieren</a>
        <a class="btn" id="raw-btn" href="#" target="_blank">Raw Metrics</a>
      </span>
    </h2>
    <table>
      <thead>
        <tr>
          <th class="rank">#</th>
          <th>Spiel</th>
          <th>Vom Cache</th>
          <th>Heruntergeladen</th>
          <th>Hit Rate</th>
          <th>Treffer / Gesamt</th>
        </tr>
      </thead>
      <tbody id="games-body">
        <tr><td colspan="6" class="empty">Lade Spieldaten...</td></tr>
      </tbody>
    </table>
    <div class="show-more" id="show-more-wrap" style="display:none;">
      <button class="btn" onclick="showAll()">Alle <span id="remaining-count"></span> weiteren Spiele anzeigen</button>
    </div>
  </div>
</div>

<script>
const METRICS_URL  = (typeof CONFIG !== 'undefined') ? CONFIG.metricsUrl : 'http://localhost:9114/metrics';
const MONITOR_BASE = METRICS_URL.replace('/metrics', '');
const TABLE_LIMIT  = 25;
let allGames = [];

document.getElementById('raw-btn').href = METRICS_URL;

function fmtBytes(b) {
  if (!b || b === 0) return '0 B';
  const u = ['B','KB','MB','GB','TB'];
  let i = 0;
  while (b >= 1024 && i < u.length - 1) { b /= 1024; i++; }
  return b.toFixed(i > 1 ? 2 : 0) + ' ' + u[i];
}
function rankClass(i) { return i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''; }
function hitClass(r)  { return r>=80?'good':r>=50?'ok':'bad'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleDepots(idx) {
  const row  = document.getElementById('dr-'+idx);
  const chev = document.getElementById('cv-'+idx);
  if (!row) return;
  row.classList.toggle('open');
  chev.classList.toggle('open');
}

function buildRows(data) {
  if (!data.length) return '<tr><td colspan="6" class="empty">Noch keine Steam-Daten im Cache.</td></tr>';
  let html = '';
  data.forEach((g, i) => {
    const multi = g.depot_count > 1;
    const meta  = multi
      ? `App&nbsp;${g.app_id} &middot; ${g.depot_count}&nbsp;Depots <span class="chevron" id="cv-${i}">&#9658;</span>`
      : `Depot&nbsp;${(g.depots && g.depots[0]) || g.app_id}`;

    html += `<tr class="main-row" ${multi ? `onclick="toggleDepots(${i})" style="cursor:pointer"` : ''}>
      <td class="rank ${rankClass(i)}">${i+1}</td>
      <td>
        <div class="game-name">${esc(g.name)}</div>
        <div class="game-meta">${meta}</div>
      </td>
      <td>${fmtBytes(g.bytes_hit)}</td>
      <td>${fmtBytes(g.bytes_miss)}</td>
      <td>
        <span class="hit-rate ${hitClass(g.hit_rate)}">${g.hit_rate}%</span>
        <div class="bar-wrap"><div class="bar-fill" style="width:${g.hit_rate}%"></div></div>
      </td>
      <td>${g.hits} / ${g.hits + g.misses}</td>
    </tr>`;

    if (multi) {
      const tags = (g.depots||[]).map(d => `<span class="depot-tag">${d}</span>`).join('');
      html += `<tr class="depot-row" id="dr-${i}">
        <td colspan="6">
          <span style="color:#718096;font-size:0.75rem;">Depot-IDs dieses Spiels:</span>
          <div class="depot-list">${tags}</div>
        </td>
      </tr>`;
    }
  });
  return html;
}

function renderRows(data) {
  document.getElementById('games-body').innerHTML = buildRows(data);
}

function showAll() {
  renderRows(allGames);
  document.getElementById('show-more-wrap').style.display = 'none';
}

async function loadDepots() {
  const url = MONITOR_BASE + '/depots?limit=1000';
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    allGames = await r.json();
    document.getElementById('status-dot').className = 'status-dot';

    const totalHit    = allGames.reduce((s,g) => s + g.bytes_hit,  0);
    const totalMiss   = allGames.reduce((s,g) => s + g.bytes_miss, 0);
    const totalDepots = allGames.reduce((s,g) => s + g.depot_count, 0);
    const total       = totalHit + totalMiss;

    document.getElementById('hit-rate').textContent      = total > 0 ? (totalHit/total*100).toFixed(1)+'%' : '0%';
    document.getElementById('bytes-hit').textContent     = fmtBytes(totalHit);
    document.getElementById('bytes-miss').textContent    = fmtBytes(totalMiss);
    document.getElementById('game-count').textContent    = allGames.length;
    document.getElementById('depot-count-sub').textContent = totalDepots + ' Depots gesamt';

    renderRows(allGames.slice(0, TABLE_LIMIT));

    const remaining = allGames.length - TABLE_LIMIT;
    const wrap = document.getElementById('show-more-wrap');
    if (remaining > 0) {
      document.getElementById('remaining-count').textContent = remaining;
      wrap.style.display = 'block';
    } else {
      wrap.style.display = 'none';
    }
    document.getElementById('last-update').textContent = 'Zuletzt: ' + new Date().toLocaleTimeString('de-DE');
  } catch(e) {
    document.getElementById('status-dot').className = 'status-dot offline';
    document.getElementById('games-body').innerHTML =
      `<tr><td colspan="6" class="empty">Monitor nicht erreichbar: ${esc(e.message)}<br><small>${esc(url)}</small></td></tr>`;
  }
}

loadDepots();
setInterval(loadDepots, 30000);
</script>
</body>
</html>
