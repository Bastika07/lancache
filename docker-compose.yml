# LanCache Slim-Stack – ohne Prometheus & Grafana
# Benoetigt nur 4 Container, ideal fuer Synology / Low-RAM-Systeme.
# Web-Dashboard: http://LANCACHE_IP:8080
# Metriken:      http://LANCACHE_IP:9114/metrics
# Spiele-JSON:   http://LANCACHE_IP:9114/depots

x-restart-policy: &restart-policy "unless-stopped"

services:

  dns:
    image: lancachenet/lancache-dns:latest
    env_file: .env
    restart: *restart-policy
    ports:
      - "${DNS_BIND_IP}:53:53/udp"
      - "${DNS_BIND_IP}:53:53/tcp"

  monolithic:
    image: lancachenet/monolithic:latest
    env_file: .env
    restart: *restart-policy
    ports:
      - "${LANCACHE_IP}:80:80/tcp"
      - "${LANCACHE_IP}:443:443/tcp"
    volumes:
      - ${CACHE_ROOT}/cache:/data/cache
      - ${CACHE_ROOT}/logs:/data/logs

  log-monitor:
    image: ghcr.io/bastika07/lancache-monitor:latest
    env_file: .env
    restart: *restart-policy
    depends_on:
      - monolithic
    volumes:
      - ${CACHE_ROOT}/logs:/data/logs:ro
    ports:
      - "9114:9114"
    environment:
      - LOG_PATH=/data/logs/access.log
      - PROMETHEUS_PORT=9114
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9114/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web-stats:
    image: ghcr.io/bastika07/lancache-web:latest
    restart: *restart-policy
    depends_on:
      - log-monitor
    ports:
      - "8080:80"
    environment:
      - LANCACHE_IP=${LANCACHE_IP}
      - PROMETHEUS_PORT=9114

networks:
  default:
    name: lancache-network
